<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate Average Marks</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <br class="container mt-5">
        <div class="calculate">
            <h1>Calculate average marks</h1>

            <!-- Main Input For Receiving Query to our ML -->
            <form action="{{ url_for('form') }}" method="post">
                <div class="mb-3">
                    <input type="text" class="form-control" name="maths" placeholder="Maths" required="required" />
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" name="science" placeholder="Science" required="required" />
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" name="history" placeholder="history" required="required" />
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-large">Calculate Button</button>
            </form>
        </div>
        <br>
        the average marks is : {{ average_marks }}
    <br>
    </div>
</body>
</html>
